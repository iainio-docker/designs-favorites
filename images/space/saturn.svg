<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Deep space background -->
  <rect width="200" height="200" rx="20" fill="#1b1740"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="30" cy="35" r="1.5"/>
    <circle cx="170" cy="40" r="1.2"/>
    <circle cx="50" cy="160" r="1.2"/>
    <circle cx="160" cy="170" r="1.5"/>
    <circle cx="25" cy="100" r="1"/>
    <circle cx="180" cy="110" r="1"/>
    <circle cx="40" cy="60" r="0.8"/>
    <circle cx="155" cy="25" r="0.8"/>
    <circle cx="60" cy="30" r="1"/>
    <circle cx="135" cy="155" r="1.2"/>
    <circle cx="85" cy="20" r="0.9"/>
    <circle cx="115" cy="22" r="0.9"/>
  </g>
  <!-- Twinkle sparkles -->
  <g fill="#fde9a0" opacity="0.85">
    <path d="M45 45 L46 49 L50 50 L46 51 L45 55 L44 51 L40 50 L44 49 Z"/>
    <path d="M165 145 L166 148 L169 149 L166 150 L165 153 L164 150 L161 149 L164 148 Z"/>
  </g>

  <!-- Saturn ring (back half) -->
  <ellipse cx="100" cy="105" rx="74" ry="18" fill="none" stroke="#d4a672" stroke-width="6"/>
  <ellipse cx="100" cy="105" rx="74" ry="18" fill="none" stroke="#f4d49a" stroke-width="2"/>

  <!-- Planet body -->
  <circle cx="100" cy="100" r="42" fill="#e0a25a"/>
  <!-- Planet bands -->
  <ellipse cx="100" cy="92" rx="40" ry="4" fill="#c98740" opacity="0.7"/>
  <ellipse cx="100" cy="103" rx="42" ry="3" fill="#f0c184" opacity="0.6"/>
  <ellipse cx="100" cy="113" rx="40" ry="4" fill="#a86a30" opacity="0.6"/>
  <ellipse cx="100" cy="122" rx="36" ry="3" fill="#c98740" opacity="0.6"/>
  <!-- Planet highlight -->
  <ellipse cx="86" cy="86" rx="10" ry="6" fill="#f6d8a2" opacity="0.6" transform="rotate(-20 86 86)"/>

  <!-- Saturn ring (front half — overlap planet) -->
  <path d="M26 105 Q60 122 100 122 Q140 122 174 105" fill="none" stroke="#d4a672" stroke-width="6" stroke-linecap="round"/>
  <path d="M26 105 Q60 122 100 122 Q140 122 174 105" fill="none" stroke="#f4d49a" stroke-width="2" stroke-linecap="round"/>

  <!-- Label -->
  <text x="100" y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f4d49a">Saturn</text>
</svg>
