<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="#fef9ee"/>

  <!-- Bowl body -->
  <ellipse cx="100" cy="130" rx="65" ry="18" fill="#e2c97e"/>
  <path d="M35 115 Q35 160 100 162 Q165 160 165 115 Z" fill="#f5e6c0"/>
  <path d="M35 115 Q35 160 100 162 Q165 160 165 115 Z" fill="none" stroke="#e2c97e" stroke-width="2"/>

  <!-- Bowl rim -->
  <ellipse cx="100" cy="115" rx="65" ry="12" fill="#e2c97e"/>
  <ellipse cx="100" cy="115" rx="60" ry="9" fill="#f9f0d6"/>

  <!-- Rice grains on top -->
  <g fill="white" stroke="#e8dcc0" stroke-width="0.5">
    <!-- Row 1 (top center) -->
    <ellipse cx="100" cy="108" rx="6" ry="3" transform="rotate(-15 100 108)"/>
    <ellipse cx="115" cy="106" rx="6" ry="3" transform="rotate(10 115 106)"/>
    <ellipse cx="85" cy="106" rx="6" ry="3" transform="rotate(20 85 106)"/>
    <!-- Row 2 -->
    <ellipse cx="93" cy="100" rx="6" ry="3" transform="rotate(-10 93 100)"/>
    <ellipse cx="107" cy="100" rx="6" ry="3" transform="rotate(5 107 100)"/>
    <ellipse cx="121" cy="102" rx="6" ry="3" transform="rotate(-20 121 102)"/>
    <ellipse cx="79" cy="102" rx="6" ry="3" transform="rotate(15 79 102)"/>
    <!-- Row 3 -->
    <ellipse cx="100" cy="94" rx="6" ry="3" transform="rotate(8 100 94)"/>
    <ellipse cx="114" cy="93" rx="6" ry="3" transform="rotate(-5 114 93)"/>
    <ellipse cx="86" cy="93" rx="6" ry="3" transform="rotate(-18 86 93)"/>
    <ellipse cx="128" cy="96" rx="6" ry="3" transform="rotate(12 128 96)"/>
    <ellipse cx="72" cy="96" rx="6" ry="3" transform="rotate(-12 72 96)"/>
    <!-- Row 4 -->
    <ellipse cx="100" cy="87" rx="6" ry="3" transform="rotate(-8 100 87)"/>
    <ellipse cx="112" cy="86" rx="6" ry="3" transform="rotate(15 112 86)"/>
    <ellipse cx="88" cy="86" rx="6" ry="3" transform="rotate(3 88 86)"/>
  </g>

  <!-- Steam wisps -->
  <g fill="none" stroke="#c9b98a" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <path d="M80 75 Q77 68 80 61 Q83 54 80 47"/>
    <path d="M100 72 Q97 65 100 58 Q103 51 100 44"/>
    <path d="M120 75 Q117 68 120 61 Q123 54 120 47"/>
  </g>

  <!-- Label -->
  <text x="100" y="185" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#a37c27">Rice</text>
</svg>
